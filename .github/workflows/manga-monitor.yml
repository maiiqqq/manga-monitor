name: Go-Manga Monitor

on:
  schedule:
    # Run every 5 minutes (GitHub Actions minimum interval)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      backfill_today:
        description: "Resend every manga that dropped a chapter (on backfill_date)"
        type: boolean
        default: false
      backfill_date:
        description: "Date to resend as YYYY-MM-DD (blank = today, site tz UTC+7)"
        type: string
        default: ""
      backfill_dryrun:
        description: "List only (log the matches, do NOT send to Telegram)"
        type: boolean
        default: false
      check_urls:
        description: "Recheck specific manga URLs directly (comma-separated)"
        type: string
        default: ""
      chained:
        description: "internal marker set by the self-chain step (leave blank)"
        type: string
        default: ""

# Scheduled runs and self-chain runs share one serialized group so they never
# race on the state push. Manual dispatches (diagnostics: check_urls / backfill)
# get their own per-run group so the continuous chain can't cancel them.
concurrency:
  group: manga-monitor-${{ (github.event_name == 'workflow_dispatch' && inputs.chained != 'yes') && github.run_id || 'state' }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # Allow pushing commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history needed for push

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Manga Bot (looped, near real-time)
        # Hard cap the step so a stuck Telegram long-poll can never hold the
        # runner for the full job timeout. Slightly above MAX_RUNTIME_SECONDS.
        timeout-minutes: 5
        continue-on-error: true  # A throttled/killed loop must still commit state
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Loop long-polling for ~4 min each run, then hand off to the next
          # scheduled run. Ending well inside the 5-min cron slot leaves margin
          # so a delayed next run overlaps (and is queued) far less often, which
          # avoids the concurrency-cancel churn when GitHub bursts backlogged
          # schedule events. Commands/buttons are answered within seconds live.
          MAX_RUNTIME_SECONDS: '240'
          # Empty on schedule/self-chain (normal loop); "true" only when a
          # manual dispatch requests a one-off resend of today's updates.
          BACKFILL_TODAY: ${{ inputs.backfill_today }}
          BACKFILL_DATE: ${{ inputs.backfill_date }}
          BACKFILL_DRYRUN: ${{ inputs.backfill_dryrun }}
          CHECK_URLS: ${{ inputs.check_urls }}
        run: |
          python bot_realtime.py

      - name: Commit state changes (if any)
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in monitor_state.json bookmarks.json bot_state.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi
          git commit -m "Update state [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:master; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing..."
            git fetch origin master
            git rebase origin/master || git rebase --abort
            sleep $((attempt * 3))
          done
          echo "Failed to push after 5 attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep the loop alive (self-chain next run)
        if: always()
        # GitHub's */5 cron is best-effort and heavily throttled, so it is not
        # truly continuous. To get as close to real-time as Actions allows, each
        # run dispatches the next one as it finishes — runs then follow back to
        # back (~90s scrape cadence, commands answered live). The GITHUB_TOKEN
        # cannot trigger another workflow (loop guard), so this needs a PAT with
        # the "actions:write" scope stored as the WORKFLOW_PAT secret. Without it
        # the step is a no-op and the */5 cron remains the (throttled) fallback,
        # which also restarts the chain if a dispatch is ever missed. Free on
        # this public repo (unlimited Actions minutes); the concurrency group
        # above keeps at most one run active so the chain never piles up.
        env:
          CHAIN_PAT: ${{ secrets.WORKFLOW_PAT }}
        run: |
          if [ -z "${CHAIN_PAT:-}" ]; then
            echo "WORKFLOW_PAT not set — relying on the */5 cron (throttled)."
            echo "Add a PAT (actions:write) as the WORKFLOW_PAT secret for continuous, near-real-time runs."
            exit 0
          fi
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${CHAIN_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/manga-monitor.yml/dispatches" \
            -d '{"ref":"master","inputs":{"chained":"yes"}}')
          echo "Next-run dispatch HTTP $code"
          [ "$code" = "204" ] || echo "::warning::self-chain dispatch returned $code (cron will still cover)"