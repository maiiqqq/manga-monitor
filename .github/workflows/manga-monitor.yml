name: Go-Manga Monitor

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Allow manual trigger

# Prevent overlapping scheduled runs from racing on the same push
concurrency:
  group: manga-monitor-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # Allow pushing commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0  # Full history needed for push

      - name: Set up Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Manga Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python go_manga_monitor.py

      - name: Commit state changes (if any)
        if: always()
        run: |
          set -euo pipefail
          set -x  # Verbose debug
          echo "=== Git status before ==="
          git status
          echo "=== Current branch/HEAD ==="
          git branch -v
          git log -1 --oneline
          echo "=== Remote URL ==="
          git remote -v
          echo "=== Config ==="
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitor_state.json
          echo "=== Diff cached ==="
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi

          echo "Has changes, committing..."
          git commit -m "Update monitor state [$(date -u 