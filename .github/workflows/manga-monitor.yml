name: Go-Manga Monitor

on:
  schedule:
    # Run every 5 minutes (GitHub Actions minimum interval)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger

# Prevent overlapping scheduled runs from racing on the same push
concurrency:
  group: manga-monitor-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # Allow pushing commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Manga Bot (looped, near real-time)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Loop long-polling for ~4.5 min each run, then hand off to the next
          # scheduled run. Commands/buttons are answered within seconds while live.
          MAX_RUNTIME_SECONDS: '270'
        run: |
          python bot_realtime.py

      - name: Commit state changes (if any)
        if: always()
        run: |
          set -euo pipefail
          set -x  # Verbose debug
          echo "=== Git status before ==="
          git status
          echo "=== Current branch/HEAD ==="
          git branch -v
          git log -1 --oneline
          echo "=== Remote URL ==="
          git remote -v
          echo "=== Config ==="
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in monitor_state.json bookmarks.json bot_state.json; do
            [ -f "$f" ] && git add "$f"
          done
          echo "=== Diff cached ==="
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi

          echo "Has changes, committing..."
          git commit -m "Update monitor state [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"

          echo "=== Pushing (with rebase + retry) ==="
          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt: git push origin HEAD:master"
            if git push origin HEAD:master 2>&1; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing on latest master..."
            git fetch origin master
            # Keep our monitor_state.json if it conflicts during rebase
            git rebase origin/master || git rebase --abort
            sleep $((attempt * 3))
          done

          echo "Failed to push after 5 attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}